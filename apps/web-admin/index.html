<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem('stock-darkmode');
          var isDark = stored ? JSON.parse(stored) === true : false;
          var root = document.documentElement;
          root.classList.toggle('dark', isDark);
          root.style.colorScheme = isDark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    <style>
      html, body { background-color: #faf8f5; color: #3a3a3a; }
      html.dark, html.dark body { background-color: #0a0a0a; color: #fafafa; }
    </style>
    <title>Sistema de Gestión LCH</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
