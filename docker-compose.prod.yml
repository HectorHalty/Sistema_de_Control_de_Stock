# Producción — Sistema de Gestión LCH (Fase 1: Inventario + Ventas)
#
#   cp .env.production.example .env.production
#   ./deploy/deploy.sh
#
# Admin: http://127.0.0.1:8080  |  API: http://127.0.0.1:3001
# HTTPS vía Caddy (deploy/Caddyfile.example → /etc/caddy/Caddyfile)

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-lch_stock}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lch} -d ${POSTGRES_DB:-lch_stock}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c 'redis-server --requirepass "$${REDIS_PASSWORD}" --appendonly yes'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
      mc mb local/lch-media || true;
      mc mb local/lch-sponsors || true;
      mc mb local/lch-football || true;
      "

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-lch}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lch_stock}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-lch}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-lch_stock}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://127.0.0.1:8080}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: "false"
      MINIO_BUCKET_MEDIA: lch-media
      MINIO_BUCKET_SPONSORS: lch-sponsors
      MINIO_BUCKET_FOOTBALL: lch-football
      PORT: 3001
    ports:
      - "127.0.0.1:${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    command: >
      sh -c "npx prisma migrate deploy && node dist/main"

  web-admin:
    build:
      context: .
      dockerfile: apps/web-admin/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?set VITE_API_URL in .env.production e.g. https://lachacra-api.duckdns.org}
    restart: unless-stopped
    environment:
      LCH_API_URL: ${VITE_API_URL:?set VITE_API_URL in .env.production}
    ports:
      - "127.0.0.1:${ADMIN_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
